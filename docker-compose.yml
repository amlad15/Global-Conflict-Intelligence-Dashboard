services:
  # ─── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gcid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gcid}
      POSTGRES_USER: ${POSTGRES_USER:-gcid_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcid_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gcid_user} -d ${POSTGRES_DB:-gcid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API + WebSocket ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gcid_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-gcid_user}:${POSTGRES_PASSWORD:-gcid_password}@postgres:5432/${POSTGRES_DB:-gcid}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Data Ingestion Workers ───────────────────────────────────────────────
  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: gcid_workers
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-gcid_user}:${POSTGRES_PASSWORD:-gcid_password}@postgres:5432/${POSTGRES_DB:-gcid}
      OPENSKY_USERNAME: ${OPENSKY_USERNAME:-}
      OPENSKY_PASSWORD: ${OPENSKY_PASSWORD:-}
      ACLED_API_KEY: ${ACLED_API_KEY:-}
      ACLED_EMAIL: ${ACLED_EMAIL:-}
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      POLL_INTERVAL_AIRCRAFT: ${POLL_INTERVAL_AIRCRAFT:-30000}
      POLL_INTERVAL_SHIPS: ${POLL_INTERVAL_SHIPS:-60000}
      POLL_INTERVAL_CONFLICTS: ${POLL_INTERVAL_CONFLICTS:-300000}
      POLL_INTERVAL_NEWS: ${POLL_INTERVAL_NEWS:-120000}
      BACKEND_WS_URL: ws://backend:4000
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: gcid_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: gcid_postgres_data
